<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Báo - Ẩm Thực 3 Miền</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css?v=3.4">
    <style>
        .notif-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid var(--divider-color);
            transition: background 0.2s;
            cursor: pointer;
            background-color: var(--card-bg);
            color: var(--text-main);
        }

        .notif-item:hover {
            background-color: var(--hover-bg);
        }

        .notif-item.unread {
            background-color: var(--hover-bg);
            border-left: 4px solid var(--fb-blue);
        }

        .notif-icon-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: white;
            font-size: 20px;
        }

        .notif-info p {
            font-size: 15px;
            margin-bottom: 4px;
            color: var(--text-main);
        }

        .notif-info p strong {
            color: var(--text-main);
        }

        .notif-time {
            font-size: 13px;
            color: var(--fb-blue);
            font-weight: 600;
        }

        h1 {
            color: var(--text-main);
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <a href="index.html" style="color: inherit; text-decoration: none;"><i class="fas fa-utensils"></i></a>
            </div>
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" placeholder="Tìm kiếm món ngon..." id="search-input">
            </div>
        </div>
        <div class="header-center">
            <a href="index.html" class="nav-item"><i class="fas fa-home"></i></a>
            <a href="dacsan.html" class="nav-item"><i class="fas fa-star"></i></a>
        </div>
        <div class="header-right">
            <div class="action-btn active"><i class="fas fa-bell"></i></div>
            <div class="user-profile" id="userAvatarBtn">
                <img src="https://i.pravatar.cc/150?u=user" alt="User Avatar" class="avatar-small">
                <div class="profile-dropdown" id="profileDropdown">
                    <a href="profile.html"><i class="fas fa-user"></i> Xem thông tin người dùng</a>
                    <a href="settings.html"><i class="fas fa-cog"></i> Cài đặt</a>
                    <div class="dropdown-divider"></div>
                    <a href="login.html" class="logout-item"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
                </div>
            </div>
        </div>
    </header>

    <main class="main-container">
        <aside class="sidebar-left">
            <ul class="sidebar-menu">
                <li class="menu-item"><a href="index.html"
                        style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:12px;"><i
                            class="fas fa-arrow-left"></i> <span>Quay lại trang chủ</span></a></li>
            </ul>
        </aside>

        <section class="feed-container">
            <div class="card" style="padding: 0;">
                <div
                    style="padding: 20px 16px; border-bottom: 1px solid var(--divider-color); display: flex; justify-content: space-between; align-items: center;">
                    <h1>Thông báo</h1>
                    <span style="color: var(--fb-blue); font-weight: 600; cursor: pointer; font-size: 14px;">Đánh dấu
                        tất cả là đã đọc</span>
                </div>

                <div id="notifications-list">
                    <!-- Notifications will be loaded here dynamically -->
                    <div style="text-align:center; padding:50px; color:#999;">
                        <i class="fas fa-bell-slash fa-3x" style="opacity:0.2; margin-bottom:15px;"></i>
                        <p>Bạn chưa có thông báo nào.</p>
                    </div>
                </div>
            </div>
        </section>

        <aside class="sidebar-right">
            <div class="card">
                <h3>Cài đặt thông báo</h3>
                <div style="margin-top: 15px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px;">
                        <span>Thông báo từ hệ thống</span>
                        <input type="checkbox" checked>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px;">
                        <span>Thông báo tương tác</span>
                        <input type="checkbox" checked>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <nav class="bottom-navbar">
        <a href="index.html" class="bottom-nav-item">
            <i class="fas fa-home"></i>
            <span>Trang chủ</span>
        </a>
        <a href="dacsan.html" class="bottom-nav-item">
            <i class="fas fa-star"></i>
            <span>Đặc sản</span>
        </a>
        <a href="saved.html" class="bottom-nav-item">
            <i class="fas fa-bookmark"></i>
            <span>Đã lưu</span>
        </a>
        <a href="profile.html" class="bottom-nav-item">
            <i class="fas fa-user"></i>
            <span>Cá nhân</span>
        </a>
    </nav>
    <script src="/static/script.js?v=2.9"></script>
</body>

</html>
