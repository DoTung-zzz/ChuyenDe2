<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Ẩm Thực 3 Miền</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
    <div class="auth-container" id="login-container">
        <div class="auth-logo">
            <i class="fas fa-utensils"></i>
        </div>
        <div class="auth-header">
            <h2>Chào mừng quay trở lại!</h2>
        </div>
        <form class="auth-form" id="login-form">
            <div class="input-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" placeholder="admin hoặc user..." required>
            </div>
            <div class="input-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" checked> Ghi nhớ mật khẩu
                </label>
                <a href="#" class="forgot-link" id="show-forgot">Quên mật khẩu?</a>
            </div>
            <button type="submit" class="auth-btn">ĐĂNG NHẬP</button>
        </form>
        <div class="auth-footer">
            Bạn chưa có tài khoản? <a href="#" id="show-register">Đăng ký ngay</a>
        </div>
    </div>

    <!-- Register Container -->
    <div class="auth-container hidden" id="register-container">
        <div class="auth-logo">
            <i class="fas fa-utensils"></i>
        </div>
        <div class="auth-header">
            <h2>Tạo tài khoản mới</h2>
        </div>
        <form class="auth-form" id="register-form">
            <div class="input-group">
                <label for="reg-fullname">Họ và tên</label>
                <input type="text" id="reg-fullname" placeholder="Nguyễn Văn A" required>
            </div>
            <div class="input-group">
                <label for="reg-username">Tên đăng nhập</label>
                <input type="text" id="reg-username" required>
            </div>
            <div class="input-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" placeholder="example@gmail.com" required>
            </div>
            <div class="input-group">
                <label for="reg-password">Mật khẩu</label>
                <input type="password" id="reg-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-btn">ĐĂNG KÝ</button>
        </form>
        <div class="auth-footer">
            Đã có tài khoản? <a href="#" id="show-login">Đăng nhập</a>
        </div>
    </div>

    <!-- Forgot Password Container -->
    <div class="auth-container hidden" id="forgot-container">
        <div class="auth-logo">
            <i class="fas fa-utensils"></i>
        </div>
        <div class="auth-header">
            <h2>Khôi phục mật khẩu</h2>
            <p style="font-size: 14px; color: grey; margin-bottom: 20px;">Nhập email của bạn để nhận hướng dẫn khôi phục.</p>
        </div>
        <form class="auth-form" id="forgot-form">
            <div class="input-group">
                <label for="forgot-email">Email đăng ký</label>
                <input type="email" id="forgot-email" placeholder="example@gmail.com" required>
            </div>
            <button type="submit" class="auth-btn">GỬI YÊU CẦU</button>
        </form>
        <div class="auth-footer">
            <a href="#" id="back-to-login"><i class="fas fa-arrow-left"></i> Quay lại đăng nhập</a>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
