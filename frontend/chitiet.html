<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Món Ăn - Ẩm Thực 3 Miền</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .detail-card {
            padding: 0;
            overflow: hidden;
        }
        .detail-hero {
            position: relative;
            height: 400px;
            width: 100%;
        }
        .detail-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .detail-hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 30px 40px;
            color: white;
        }
        .detail-content {
            padding: 30px 40px;
        }
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .ingredients-list {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .ingredients-list ul {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .ingredients-list li {
            padding: 5px 0;
            border-bottom: 1px dashed var(--divider-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .ingredients-list li::before {
            content: "\f00c";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            color: #45bd62;
            font-size: 12px;
        }
        .recipe-steps {
            line-height: 1.8;
            font-size: 16px;
        }
        .recipe-step {
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
        }
        .step-num {
            background: var(--primary-color);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <a href="index.html" style="color: inherit; text-decoration: none;"><i class="fas fa-utensils"></i></a>
            </div>
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" placeholder="Tìm kiếm món ngon..." id="search-input">
            </div>
        </div>
        <div class="header-center">
            <a href="index.html" class="nav-item active"><i class="fas fa-home"></i></a>
            <a href="dacsan.html" class="nav-item"><i class="fas fa-star"></i></a>
        </div>
        <div class="header-right">
            <div class="action-btn"><i class="fas fa-bell"></i></div>
            <div class="user-profile" id="userAvatarBtn">
                <img src="https://i.pravatar.cc/150?u=user" alt="User Avatar" class="avatar-small">
                <div class="profile-dropdown" id="profileDropdown">
                    <a href="profile.html"><i class="fas fa-user"></i> Xem thông tin người dùng</a>
                    <a href="settings.html"><i class="fas fa-cog"></i> Cài đặt</a>
                    <div class="dropdown-divider"></div>
                    <a href="login.html" class="logout-item"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
                </div>
            </div>
        </div>
    </header>

    <main class="main-container">
        <aside class="sidebar-left">
            <ul class="sidebar-menu">
                <li class="menu-item"><a href="index.html" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:12px;"><i class="fas fa-arrow-left"></i> <span>Quay lại trang chủ</span></a></li>
                <li class="menu-item"><div class="menu-icon specialty"><i class="fas fa-star"></i></div> <span>Đặc sản vùng miền</span></li>
                <li class="menu-item"><div class="menu-icon saved"><i class="fas fa-bookmark"></i></div> <span>Món đã lưu</span></li>
            </ul>
        </aside>

        <section class="feed-container">
            <div class="card detail-card" id="post-detail-container">
                <!-- Loading State -->
                <div style="padding: 40px; text-align: center;">
                    <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--primary-color);"></i>
                    <p style="margin-top: 15px;">Đang tải tinh hoa ẩm thực...</p>
                </div>
            </div>

            <!-- Comment Section -->
            <div class="card" style="margin-top: 20px;">
                <h3 class="section-title"><i class="fas fa-comments"></i> Bình luận</h3>
                <div class="post-top">
                    <img src="https://i.pravatar.cc/150?u=user" alt="User" class="avatar-medium">
                    <div style="flex: 1; position: relative;">
                        <input type="text" placeholder="Viết bình luận của bạn..." class="mock-input" style="width: 100%;" id="comment-input">
                        <button id="send-comment" style="position: absolute; right: 10px; top: 10px; background: none; border: none; color: var(--primary-color); cursor: pointer;"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
                <div class="post-divider"></div>
                <div id="comment-list">
                    <!-- Comments will be loaded here -->
                </div>
            </div>
        </section>

        <aside class="sidebar-right">
            <div class="card">
                <h3 class="section-title">Thông tin tác giả</h3>
                <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
                    <img id="author-avatar" src="https://i.pravatar.cc/150?u=author" alt="Author" style="width: 50px; height: 50px; border-radius: 50%;">
                    <div>
                        <h4 id="author-name">Đang tải...</h4>
                        <span style="color: grey; font-size: 13px;">Chuyên gia ẩm thực</span>
                    </div>
                </div>
                <button class="btn-view-recipe" style="width: 100%; padding: 10px; background-color: var(--primary-color); color: white;">Theo dõi</button>
            </div>
        </aside>
    </main>

    <script src="/static/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('id') || 1;
            
            // This function will be called in script.js, but I'll add a placeholder here
            if (typeof loadPostDetail === 'function') {
                loadPostDetail(postId);
            }
        });
    </script>
</body>
</html>
