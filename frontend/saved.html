<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đã Lưu - Ẩm Thực 3 Miền</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Shared Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <a href="index.html" style="color: inherit; text-decoration: none;"><i class="fas fa-utensils"></i></a>
            </div>
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" placeholder="Tìm kiếm..." id="search-input">
            </div>
        </div>
        <div class="header-center">
            <a href="index.html" class="nav-item" title="Trang chủ"><i class="fas fa-home"></i></a>
            <a href="dacsan.html" class="nav-item" title="Đặc sản"><i class="fas fa-star"></i></a>
        </div>
        <div class="header-right">
            <div class="action-btn"><i class="fas fa-bell"></i></div>
            <div class="user-profile" id="userAvatarBtn">
                <img src="https://i.pravatar.cc/150?u=user" alt="User Avatar" class="avatar-small">
                <div class="profile-dropdown" id="profileDropdown">
                    <a href="profile.html"><i class="fas fa-user"></i> Xem thông tin người dùng</a>
                    <a href="settings.html"><i class="fas fa-cog"></i> Cài đặt</a>
                    <div class="dropdown-divider"></div>
                    <a href="login.html" class="logout-item"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
                </div>
            </div>
        </div>
    </header>

    <main class="main-container">
        <!-- Sidebar Left -->
        <aside class="sidebar-left">
            <ul class="sidebar-menu">
                <li class="menu-item">
                    <img src="https://i.pravatar.cc/150?u=user" alt="User" class="avatar-menu">
                    <span>Người dùng</span>
                </li>
                <li class="menu-item">
                    <a href="dacsan.html" style="display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; width: 100%;">
                        <div class="menu-icon specialty"><i class="fas fa-star"></i></div>
                        <span>Đặc sản vùng miền</span>
                    </a>
                </li>
                <li class="menu-item active" style="background-color: var(--hover-color);">
                    <a href="saved.html" style="display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; width: 100%;">
                        <div class="menu-icon saved"><i class="fas fa-bookmark"></i></div>
                        <span style="font-weight: bold; color: var(--text-main);">Món đã lưu</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="trending.html" style="display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; width: 100%;">
                        <div class="menu-icon trending"><i class="fas fa-fire"></i></div>
                        <span>Xu hướng ẩm thực</span>
                    </a>
                </li>
            </ul>
        </aside>

        <!-- Saved Items Content -->
        <section class="feed-container">
            <h2 style="margin-bottom: 20px;">Món Đã Lưu</h2>
            
            <div class="filters" style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="btn-view-recipe" style="background-color: #f1f1f1; color: #333; border-radius: 20px; padding: 5px 15px;">Tất cả</button>
                <button class="btn-view-recipe" style="background-color: #f1f1f1; color: #333; border-radius: 20px; padding: 5px 15px;">Công thức</button>
                <button class="btn-view-recipe" style="background-color: #f1f1f1; color: #333; border-radius: 20px; padding: 5px 15px;">Bài viết</button>
                <button class="btn-view-recipe" style="background-color: #f1f1f1; color: #333; border-radius: 20px; padding: 5px 15px;">Nhà hàng</button>
            </div>

            <div id="saved-posts-container" class="stats-grid" style="grid-template-columns: repeat(2, 1fr);">
                <!-- Saved items will be loaded here -->
                <div style="grid-column: span 2; padding: 40px; text-align: center;">
                    <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--primary-color);"></i>
                    <p style="margin-top: 15px; color: grey;">Đang tải danh sách đã lưu...</p>
                </div>
            </div>
        </section>
    </main>
    <script src="/static/script.js"></script>
</body>
</html>
